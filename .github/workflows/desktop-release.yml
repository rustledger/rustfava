name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  # Triggered by rustledger releases
  repository_dispatch:
    types: [rustledger-release]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTLEDGER_REPO: rustledger/rustledger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build-sidecar:
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: rustfava-server-x86_64-unknown-linux-gnu
            python-arch: x64
          # PyInstaller cannot cross-compile: it emits a binary for the arch
          # of the *Python that runs it*. GitHub retired the Intel macos-13
          # image (#222), so the x64 sidecar now builds on an Apple Silicon
          # runner with an x86_64 Python running under Rosetta 2 (hosted macOS
          # ARM runners ship Rosetta): setup-python `architecture: x64` gives
          # an Intel interpreter, pip then resolves x86_64 wheels, and
          # PyInstaller emits a genuine x86_64-apple-darwin binary (#193).
          - os: macos-14
            target: x86_64-apple-darwin
            sidecar_name: rustfava-server-x86_64-apple-darwin
            python-arch: x64
            # setup-python's macOS "x64" build is a universal2 binary: launched
            # plainly on an ARM runner it runs as arm64 and PyInstaller then
            # emits an arm64 sidecar (caught by the arch-verify step). Forcing
            # the x86_64 slice via `arch -x86_64` makes pip resolve x86_64
            # wheels and PyInstaller emit a genuine Intel binary.
            py-run: arch -x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_name: rustfava-server-aarch64-apple-darwin
            python-arch: arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: rustfava-server-x86_64-pc-windows-msvc.exe
            python-arch: x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Get latest rustledger tag
        id: rustledger-tag
        shell: bash
        run: |
          TAG=$(gh release view --repo ${{ env.RUSTLEDGER_REPO }} --json tagName -q '.tagName')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using rustledger $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download rustledger component WASM from release
        shell: bash
        # The in-process WASI Preview 2 component is the engine; the frozen app
        # bundles it (see contrib/pyinstaller_spec.spec) so it need not download
        # at first run. The legacy rustledger-ffi-wasi-*.wasm is no longer
        # shipped upstream (rustledger #1419).
        run: |
          gh release download ${{ steps.rustledger-tag.outputs.tag }} \
            --repo ${{ env.RUSTLEDGER_REPO }} \
            --pattern "rustledger-ffi-component-*.wasm" \
            --output src/rustfava/rustledger/rustledger_ffi_component.wasm
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13'
          # x64 on the macos-14 x86_64 entry = Intel Python under Rosetta (#222)
          architecture: ${{ matrix.python-arch }}
          cache: 'pip'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python dependencies
        shell: bash
        # ${{ matrix.py-run }} pins the interpreter arch (see the matrix note);
        # `python -m pip` (not bare pip) so the prefix governs pip too.
        #
        # Install the project so the frozen build gets the ACTUAL
        # dependencies from pyproject.toml. The previous hand-maintained
        # package list drifted twice (missing simplejson and wasmtime),
        # shipping a v1.31.0 desktop sidecar that crashed on startup
        # everywhere (#233).
        #
        # Two-step because pip cannot drive this repo's custom build backend
        # (BackendUnavailable) while uv can: uv builds the pure-Python wheel
        # natively (arch-independent), then the arch-pinned pip installs the
        # wheel so DEPENDENCY resolution happens under the target arch
        # (x86_64 wheels for the Rosetta build).
        run: |
          uv build --wheel
          ${{ matrix.py-run }} python -m pip install --upgrade pip
          ${{ matrix.py-run }} python -m pip install pyinstaller dist/rustfava-*.whl

      - name: Build frontend assets
        shell: bash
        run: |
          cd frontend && bun install && bun run build

      - name: Compile translations
        shell: bash
        run: |
          python -c "
          from pathlib import Path
          from babel.messages.mofile import write_mo
          from babel.messages.pofile import read_po
          for po in Path('src/rustfava/translations').glob('**/messages.po'):
              mo = po.parent / 'messages.mo'
              catalog = read_po(po.open('rb'), po.parts[-3])
              write_mo(mo.open('wb'), catalog)
              print(f'Compiled {po} -> {mo}')
          "

      - name: Set RUSTFAVA_VERSION from tag
        # The spec bakes this into rustfava/_version.py so the frozen binary
        # reports the real version without dist-info metadata (issue #191).
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: echo "RUSTFAVA_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Build sidecar with PyInstaller
        shell: bash
        run: |
          ${{ matrix.py-run }} python -m PyInstaller contrib/pyinstaller_spec.spec --noconfirm

      - name: Rename sidecar (Unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/rustfava dist/${{ matrix.sidecar_name }}

      - name: Rename sidecar (Windows)
        if: runner.os == 'Windows'
        run: |
          move dist\rustfava.exe dist\${{ matrix.sidecar_name }}

      - name: Verify sidecar architecture (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          BIN="dist/${{ matrix.sidecar_name }}"
          file "$BIN"
          case "${{ matrix.target }}" in
            x86_64-*) EXPECT="x86_64" ;;
            aarch64-*) EXPECT="arm64" ;;
            *) echo "::error::Unknown macOS target ${{ matrix.target }}"; exit 1 ;;
          esac
          # Use `file -b` (no filename) so the sidecar_name — which itself
          # contains "x86_64"/"aarch64" — can't false-match the grep.
          if ! file -b "$BIN" | grep -qw "$EXPECT"; then
            echo "::error::Sidecar arch mismatch: expected $EXPECT for ${{ matrix.target }}, got: $(file -b "$BIN")"
            exit 1
          fi

      - name: Smoke test the frozen sidecar
        shell: bash
        # Actually RUN the frozen binary against a mini ledger and require an
        # HTTP response. v1.31.0 shipped a sidecar that crashed on startup
        # from a missing bundled module on every platform, and nothing in the
        # pipeline executed the binary to notice (#233). NB: the macOS x64
        # binary runs under Rosetta here, which is also worth exercising.
        run: |
          BIN="dist/${{ matrix.sidecar_name }}"
          printf '2020-01-01 open Assets:Cash\n2020-01-01 open Equity:Open\n2020-01-02 * "smoke"\n  Assets:Cash  1.00 USD\n  Equity:Open  -1.00 USD\n' > smoke.beancount
          "$BIN" --port 45987 smoke.beancount &
          PID=$!
          OK=""
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null "http://127.0.0.1:45987/"; then OK=1; break; fi
            if ! kill -0 "$PID" 2>/dev/null; then break; fi
            sleep 1
          done
          ENGINE=""
          if [ "$OK" = "1" ]; then
            # require an engine-backed endpoint too: proves the bundled
            # wasmtime + component wasm actually load, not just the Flask
            # shell. Discover the ledger slug from the / redirect rather than
            # guessing it (round 3 guessed wrong and 404'd).
            REDIR=$(curl -s -o /dev/null -w '%{redirect_url}' "http://127.0.0.1:45987/")
            API=$(printf '%s' "$REDIR" | sed -E 's#[^/]+/?$#api/options#')
            echo "redirect: $REDIR -> probing: $API"
            curl -fsS -o /dev/null "$API" && ENGINE=1
          fi
          kill "$PID" 2>/dev/null || true
          if [ "$OK" != "1" ] || [ "$ENGINE" != "1" ]; then
            echo "::error::frozen sidecar failed to start or serve (the #233 failure class); shell=$OK engine=$ENGINE"
            exit 1
          fi
          echo "sidecar smoke OK (shell + engine)"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sidecar-${{ matrix.target }}
          path: dist/${{ matrix.sidecar_name }}

  download-rustledger:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - target: x86_64-apple-darwin
            archive: tar.gz
          - target: aarch64-apple-darwin
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ubuntu-latest
    steps:
      - name: Get latest rustledger tag
        id: rustledger-tag
        shell: bash
        run: |
          TAG=$(gh release view --repo ${{ env.RUSTLEDGER_REPO }} --json tagName -q '.tagName')
          VERSION=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using rustledger $TAG"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download rustledger binaries from release
        run: |
          gh release download ${{ steps.rustledger-tag.outputs.tag }} \
            --repo ${{ env.RUSTLEDGER_REPO }} \
            --pattern "rustledger-${{ steps.rustledger-tag.outputs.tag }}-${{ matrix.target }}.${{ matrix.archive }}" \
            --output rustledger.${{ matrix.archive }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract binaries (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p binaries
          tar -xzf rustledger.${{ matrix.archive }}
          # Rename binaries to include target triple (Tauri sidecar convention)
          for bin in rledger; do
            if [ -f "$bin" ]; then
              mv "$bin" "binaries/${bin}-${{ matrix.target }}"
            fi
          done

      - name: Extract binaries (zip)
        if: matrix.archive == 'zip'
        run: |
          mkdir -p binaries
          unzip rustledger.${{ matrix.archive }}
          # Rename binaries to include target triple (Tauri sidecar convention)
          for bin in rledger; do
            if [ -f "${bin}.exe" ]; then
              mv "${bin}.exe" "binaries/${bin}-${{ matrix.target }}.exe"
            fi
          done

      - name: Upload rustledger binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustledger-${{ matrix.target }}
          path: binaries/*

  build-tauri:
    needs: [build-sidecar, download-rustledger]
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: rustfava-server-x86_64-unknown-linux-gnu
          # The Intel macos-13 image is retired (#222). Rust cross-compiles
          # x86_64-apple-darwin on Apple Silicon natively (the toolchain step
          # installs matrix.target and tauri-action passes --target), and
          # hosted macOS ARM runners ship Rosetta 2, so launching the built
          # x64 binary for a smoke test also works (revisits issue #193).
          - os: macos-14
            target: x86_64-apple-darwin
            sidecar_name: rustfava-server-x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_name: rustfava-server-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: rustfava-server-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download sidecar artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Download rustledger binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: rustledger-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Make binaries executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x desktop/src-tauri/binaries/*

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: desktop/src-tauri
          cache-targets: true
          cache-all-crates: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Install frontend dependencies
        working-directory: desktop
        run: bun install

      - name: Update version from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Updating tauri.conf.json version to $VERSION"
          cd desktop/src-tauri
          # Update version in tauri.conf.json using jq
          jq --arg v "$VERSION" '.version = $v' tauri.conf.json > tauri.conf.json.tmp
          mv tauri.conf.json.tmp tauri.conf.json
          cat tauri.conf.json | grep version

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: bun tauri
          args: --target ${{ matrix.target }}

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        run: |
          APP_PATH="$(pwd)/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/rustfava.app"
          BINARY="$APP_PATH/Contents/MacOS/rustfava-desktop"
          echo "Testing app at: $APP_PATH"
          ls -la "$APP_PATH" || { echo "App bundle not found!"; exit 1; }
          file "$BINARY"

          # Verify the bundled sidecar matches the target arch (issue #193).
          # Tauri strips the target triple, so the bundled name is plain
          # `rustfava-server` (no arch substring to confuse the grep).
          SIDECAR="$APP_PATH/Contents/MacOS/rustfava-server"
          if [ -f "$SIDECAR" ]; then
            file "$SIDECAR"
            case "${{ matrix.target }}" in
              x86_64-*) EXPECT="x86_64" ;;
              aarch64-*) EXPECT="arm64" ;;
              *) echo "::error::Unknown macOS target ${{ matrix.target }}"; exit 1 ;;
            esac
            if ! file -b "$SIDECAR" | grep -qw "$EXPECT"; then
              echo "::error::Bundled sidecar arch mismatch: expected $EXPECT for ${{ matrix.target }}, got: $(file -b "$SIDECAR")"
              exit 1
            fi
          else
            echo "::error::Bundled sidecar not found at $SIDECAR"
            exit 1
          fi

          # Run binary directly to capture stdout/stderr and panic backtrace
          echo "=== Launching with RUST_BACKTRACE=full ==="
          RUST_BACKTRACE=full RUST_LOG=debug "$BINARY" > /tmp/app.log 2>&1 &
          PID=$!
          echo "Started PID: $PID"

          sleep 5

          if kill -0 $PID 2>/dev/null; then
            echo "✓ App launched successfully"
            kill $PID || true
          else
            echo "✗ App crashed on startup!"
            echo ""
            echo "=== App output ==="
            cat /tmp/app.log || true
            echo ""
            echo "=== Exit code ==="
            wait $PID || EXIT_CODE=$?
            echo "Exit code: ${EXIT_CODE:-unknown}"
            echo ""
            echo "=== Crash reports ==="
            sleep 2
            find ~/Library/Logs/DiagnosticReports -name "*rustfava*" -mmin -5 2>/dev/null | head -3 | while read f; do
              echo "--- $f ---"
              head -150 "$f"
            done
            echo ""
            echo "=== System log ==="
            log show --predicate 'processImagePath CONTAINS "rustfava"' --last 1m 2>/dev/null | tail -30 || true
            exit 1
          fi

      - name: Create tarball (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p tarball-staging/bin tarball-staging/lib/rustfava/resources
          # Copy main binary
          cp desktop/src-tauri/target/${{ matrix.target }}/release/rustfava-desktop tarball-staging/bin/
          # Copy sidecars (server + rustledger CLI tools)
          cp desktop/src-tauri/binaries/* tarball-staging/bin/
          # Copy resources
          cp contrib/examples/example.beancount tarball-staging/lib/rustfava/resources/
          # Create tarball
          tar -czvf rustfava-desktop-${{ matrix.target }}.tar.gz -C tarball-staging .

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rustfava-${{ matrix.target }}
          path: |
            rustfava-desktop-${{ matrix.target }}.tar.gz
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          pattern: rustfava-*
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
          draft: true
          generate_release_notes: true
