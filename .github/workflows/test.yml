name: Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test-py:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        py: ["3.14", "3.13"]
        include:
          # Use Python 3.13 for macOS as beancount lacks 3.14 wheels
          - os: "macos-latest"
            py: "3.13"
          # The component engine runs correctly on Windows; the only snag was
          # uppercase hex in object-address snapshot normalization (fixed in
          # conftest). beancount lacks 3.14 wheels, so pin 3.13.
          - os: "windows-latest"
            py: "3.13"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.py }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
      - name: Provision rustledger component WASM
        shell: bash
        # The component is gitignored (downloaded lazily at runtime), so CI
        # checkouts lack it and every component-gated test silently skipped
        # (the availability gate is evaluated at import time, before the
        # lazy download can happen). Provision the pinned release asset so
        # the component suite actually runs — and coverage of
        # component_engine.py (now inside the 100% gate) is complete.
        run: |
          TAG=$(grep -oE 'RUSTLEDGER_VERSION = "v[0-9.]+"' src/rustfava/rustledger/engine.py | grep -oE 'v[0-9.]+')
          gh release download "$TAG" --repo rustledger/rustledger \
            --pattern "rustledger-ffi-component-*.wasm" \
            --output src/rustfava/rustledger/rustledger_ffi_component.wasm
        env:
          GH_TOKEN: ${{ github.token }}
      - run: touch src/rustfava/static/app.js
      - run: just test-py

  test-py-typeguard:
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1
      - name: Provision rustledger component WASM
        shell: bash
        # The component is gitignored (downloaded lazily at runtime), so CI
        # checkouts lack it and every component-gated test silently skipped
        # (the availability gate is evaluated at import time, before the
        # lazy download can happen). Provision the pinned release asset so
        # the component suite actually runs — and coverage of
        # component_engine.py (now inside the 100% gate) is complete.
        run: |
          TAG=$(grep -oE 'RUSTLEDGER_VERSION = "v[0-9.]+"' src/rustfava/rustledger/engine.py | grep -oE 'v[0-9.]+')
          gh release download "$TAG" --repo rustledger/rustledger \
            --pattern "rustledger-ffi-component-*.wasm" \
            --output src/rustfava/rustledger/rustledger_ffi_component.wasm
        env:
          GH_TOKEN: ${{ github.token }}
      - run: touch src/rustfava/static/app.js
      - run: just test-py-typeguard

  test-js:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: cd frontend && bun install --frozen-lockfile
      - run: cd frontend && bun run build
      - run: cd frontend && bun run test

  lint-js:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: cd frontend && bun install --frozen-lockfile
      - run: cd frontend && bun run eslint --max-warnings 0 .
      - run: cd frontend && bun run stylelint "**/*.{css,svelte}"
      - run: cd frontend && bun run tsc
      - run: cd frontend && bun run svelte-check

  lint-python-types:
    runs-on: "ubuntu-latest"
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - run: touch src/rustfava/static/app.js
      - run: just mypy

  check-lockfile:
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv lock --check
